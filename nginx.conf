events {
    worker_connections 1024;
}

http {
    # ── Security headers ─────────────────────────────────
    server_tokens off;

    # ── Rate limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=5r/s;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Redirect HTTP → HTTPS ────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API (backend) ────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.gmopero.com.br;

        ssl_certificate     /etc/letsencrypt/live/gmopero.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gmopero.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 10M;

        location /api/fiscal/webhook {
            limit_req zone=webhook burst=10 nodelay;
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Frontend ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name app.gmopero.com.br;

        ssl_certificate     /etc/letsencrypt/live/gmopero.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gmopero.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://frontend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
