name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip CI checks (emergency deploy)
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/gmopero-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/gmopero-frontend

jobs:
  # ── Gate: run CI first ───────────────────────────────
  ci:
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml

  # ── Build & Push Docker Images ───────────────────────
  build-backend:
    name: Build Backend Image
    needs: [ci]
    if: ${{ always() && (needs.ci.result == 'success' || inputs.skip_tests) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    needs: [ci]
    if: ${{ always() && (needs.ci.result == 'success' || inputs.skip_tests) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
            nginx.conf

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: ~/gmopero

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/gmopero

            # Write .env from GitHub secrets
            cat > .env <<'ENVEOF'
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN }}
            FRONTEND_URL=${{ vars.FRONTEND_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            PLUGNOTAS_API_KEY=${{ secrets.PLUGNOTAS_API_KEY }}
            PLUGNOTAS_BASE_URL=${{ vars.PLUGNOTAS_BASE_URL }}
            PLUGNOTAS_WEBHOOK_SECRET=${{ secrets.PLUGNOTAS_WEBHOOK_SECRET }}
            PLUGNOTAS_ALLOWED_HOSTS=${{ vars.PLUGNOTAS_ALLOWED_HOSTS }}
            SSL_EMAIL=${{ vars.SSL_EMAIL }}
            DOMAIN=${{ vars.DOMAIN }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ENVEOF
            chmod 600 .env

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Save current image tags for rollback
            docker compose -f docker-compose.prod.yml ps --format json | jq -r '.[].Image' > .previous-images 2>/dev/null || true

            # Pull new images and restart (zero-downtime for stateless services)
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            # Wait and health check
            echo "Waiting for backend health check..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend wget -q --spider http://localhost:3000/api/health 2>/dev/null; then
                echo "✅ Backend healthy"
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed — rolling back"
            if [ -f .previous-images ]; then
              docker compose -f docker-compose.prod.yml down
              # Restore previous .env with old image tags would go here
            fi
            exit 1

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=168h"
