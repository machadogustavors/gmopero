name: Database Backup

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual backup
        required: false

jobs:
  backup:
    name: Backup PostgreSQL
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run backup on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            BACKUP_DIR=~/gmopero/backups
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/gmopero_${TIMESTAMP}.sql.gz"

            mkdir -p "$BACKUP_DIR"

            # Dump database from running container
            docker compose -f ~/gmopero/docker-compose.prod.yml exec -T postgres \
              pg_dump -U ${{ secrets.DB_USER }} -d gmopero --no-owner --clean --if-exists \
              | gzip > "$BACKUP_FILE"

            # Verify backup is not empty
            FILESIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || stat -f%z "$BACKUP_FILE")
            if [ "$FILESIZE" -lt 1000 ]; then
              echo "❌ Backup file suspiciously small (${FILESIZE} bytes)"
              rm -f "$BACKUP_FILE"
              exit 1
            fi

            echo "✅ Backup created: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

            # Keep only last 30 daily backups
            ls -tp "$BACKUP_DIR"/gmopero_*.sql.gz | tail -n +31 | xargs -r rm --
            echo "🧹 Old backups cleaned (keeping last 30)"

            # List current backups
            echo "── Current backups ──"
            ls -lh "$BACKUP_DIR"/gmopero_*.sql.gz
